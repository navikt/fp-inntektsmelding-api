<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="../swagger-ui/5.32.5/swagger-ui.css">
    <link rel="icon" type="image/png" href="../swagger-ui/5.32.5/favicon-32x32.png" sizes="32x32"/>
</head>
<body>
<div id="swagger-ui"></div>
<script src="../swagger-ui/5.32.5/swagger-ui-bundle.js"></script>
<script src="../swagger-ui/5.32.5/swagger-ui-standalone-preset.js"></script>
<script>
    window.onload = function () {
        SwaggerUIBundle({
            url: "/v1/openapi.json",
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
            plugins: [SwaggerUIBundle.plugins.DownloadUrl],
            layout: "StandaloneLayout"
        });
    }
</script>
</body>
</html>
